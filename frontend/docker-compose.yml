services:
  db:
    image: postgres:17-alpine
    container_name: cybersport-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: ..
      dockerfile: frontend/Dockerfile.backend
    container_name: cybersport-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_PORT: ${SERVER_PORT}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      JAVA_OPTS: ${JAVA_OPTS}
    ports:
      - "${SERVER_PORT}:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:${SERVER_PORT}/actuator/health/readiness > /dev/null || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /
    container_name: cybersport-frontend
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      NGINX_API_UPSTREAM: http://app:8080
    ports:
      - "${FRONTEND_PORT}:80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://localhost/ || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  postgres-data:
