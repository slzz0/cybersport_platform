name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: cybersport
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d cybersport"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      SPRING_PROFILES_ACTIVE: test
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/cybersport
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend verify
        run: mvn -B verify

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile.backend
          push: false
          tags: cybersport-platform:${{ github.sha }}

  deploy_backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    needs:
      - docker
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Skip if backend deploy hook is missing
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL == '' }}
        run: echo "RENDER_DEPLOY_HOOK_URL is not set. Skipping backend deploy."

      - name: Trigger Render deploy
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  deploy_frontend:
    name: Deploy Frontend to Render
    runs-on: ubuntu-latest
    needs:
      - frontend
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Skip if frontend deploy hook is missing
        if: ${{ secrets.FRONTEND_RENDER_DEPLOY_HOOK_URL == '' }}
        run: echo "FRONTEND_RENDER_DEPLOY_HOOK_URL is not set. Skipping frontend deploy."

      - name: Trigger frontend deploy
        if: ${{ secrets.FRONTEND_RENDER_DEPLOY_HOOK_URL != '' }}
        run: curl -fsS -X POST "${{ secrets.FRONTEND_RENDER_DEPLOY_HOOK_URL }}"

  healthcheck_backend:
    name: Backend Healthcheck
    runs-on: ubuntu-latest
    needs:
      - deploy_backend
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Skip if backend healthcheck config is missing
        if: ${{ secrets.APP_BASE_URL == '' || secrets.RENDER_DEPLOY_HOOK_URL == '' }}
        run: echo "APP_BASE_URL or RENDER_DEPLOY_HOOK_URL is not set. Skipping backend healthcheck."

      - name: Wait for backend to become healthy
        if: ${{ secrets.APP_BASE_URL != '' && secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
        run: |
          for attempt in $(seq 1 20); do
            if curl -fsS "${APP_BASE_URL}/actuator/health/readiness" > /tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            echo "Healthcheck attempt ${attempt}/20 failed, waiting..."
            sleep 15
          done

          echo "Application did not become healthy in time."
          exit 1

  healthcheck_frontend:
    name: Frontend Healthcheck
    runs-on: ubuntu-latest
    needs:
      - deploy_frontend
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Skip if frontend healthcheck config is missing
        if: ${{ secrets.FRONTEND_APP_BASE_URL == '' || secrets.FRONTEND_RENDER_DEPLOY_HOOK_URL == '' }}
        run: echo "FRONTEND_APP_BASE_URL or FRONTEND_RENDER_DEPLOY_HOOK_URL is not set. Skipping frontend healthcheck."

      - name: Wait for frontend to become healthy
        if: ${{ secrets.FRONTEND_APP_BASE_URL != '' && secrets.FRONTEND_RENDER_DEPLOY_HOOK_URL != '' }}
        env:
          FRONTEND_APP_BASE_URL: ${{ secrets.FRONTEND_APP_BASE_URL }}
        run: |
          for attempt in $(seq 1 20); do
            if curl -fsS "${FRONTEND_APP_BASE_URL}" > /tmp/frontend.html; then
              head -n 5 /tmp/frontend.html
              exit 0
            fi
            echo "Frontend healthcheck attempt ${attempt}/20 failed, waiting..."
            sleep 15
          done

          echo "Frontend did not become healthy in time."
          exit 1
